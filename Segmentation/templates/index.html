<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uni-RAG | Document Classifier</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --neon-blue: #00f3ff;
            --bg-dark: #050510;
            --glass-bg: rgba(15, 20, 35, 0.7);
            --border-color: rgba(0, 243, 255, 0.3);
            --text-main: #e0e6ed;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow: hidden;
        }

        /* Neural Background Grid & Stars */
        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(20, 30, 60, 0.4) 0%, rgba(5, 5, 16, 1) 70%),
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative;
        }

        /* Top Neon Line */
        .container::after {
            content: '';
            position: absolute;
            top: -1px; left: 20%; right: 20%; height: 2px;
            background: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }
        
        h1 span { color: var(--neon-blue); }

        .note {
            color: var(--text-muted);
            font-size: 0.9em;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Styled File Input Area */
        .file-drop-zone {
            position: relative;
            height: 120px;
            border: 2px dashed rgba(0, 243, 255, 0.3);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            background: rgba(0, 0, 0, 0.2);
        }

        .file-drop-zone:hover {
            border-color: var(--neon-blue);
            background: rgba(0, 243, 255, 0.05);
        }

        /* The actual input is hidden but clickable over the whole div */
        .file-drop-zone input[type="file"] {
            position: absolute;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .icon { font-size: 24px; margin-bottom: 8px; }
        .file-msg { font-size: 0.9rem; color: var(--text-main); }

        /* Submit Button */
        input[type="submit"] {
            background: transparent;
            color: var(--neon-blue);
            padding: 15px;
            border: 1px solid var(--neon-blue);
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background: var(--neon-blue);
            color: #050510;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="container">
        <h1>UNI-RAG <span>AGENT</span></h1>
        <p class="note">Upload **PDF (.pdf)** files. They will be classified and automatically routed to the correct folder within your `RawData` directory.</p>
        
        <form method="POST" action="{{ url_for('classify_document') }}" enctype="multipart/form-data">
            
            <div class="file-drop-zone">
                <span class="icon">📂</span>
                <span class="file-msg" id="fileMsg">Click to select PDF files</span>
                <input type="file" name="files" accept=".pdf" multiple required onchange="updateFileName(this)">
            </div>

            <input type="submit" value="Classify and Route Documents">
        </form>
    </div>

    <script>
        function updateFileName(input) {
            const msg = document.getElementById('fileMsg');
            if (input.files && input.files.length > 0) {
                msg.innerText = `${input.files.length} file(s) selected`;
                msg.style.color = '#00f3ff';
            } else {
                msg.innerText = "Click to select PDF files";
                msg.style.color = '#e0e6ed';
            }
        }
    </script>
</body>
</html>
